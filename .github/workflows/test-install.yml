name: ci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run build
